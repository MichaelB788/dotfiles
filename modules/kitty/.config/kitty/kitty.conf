# See https://sw.kovidgoyal.net/kitty/conf/ for configuration options

enabled_layouts                 tall:bias=50;full_size=1;mirrored=false
enable_audio_bell               no
dynamic_background_opacity 			yes
hide_window_decorations         no
draw_minimal_borders            no
background_opacity              0.8
single_window_margin_width      0
single_window_padding_width     0
window_margin_width             2
window_padding_width            2
active_border_color             #5ea373
inactive_border_color           #292929

map ctrl+shift+c                copy_to_clipboard
map ctrl+shift+v                paste_from_clipboard

# Window layout
map ctrl+shift+enter            new_window_with_cwd
map ctrl+shift+e                next_layout
map ctrl+shift+l                next_tab
map ctrl+shift+h                previous_tab
map ctrl+shift+t                new_tab_with_cwd
font_size 14

# BEGIN_KITTY_THEME
# Kanagawa
include current-theme.conf
# END_KITTY_THEME

# BEGIN_KITTY_FONTS
font_family      family='JetBrainsMono Nerd Font' postscript_name=JetBrainsMonoNF-Regular
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
